<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hesteskokasting Resultater</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

  <header class="topp-header">
    <span class="header-tittel">Hesteskokasting Resultater</span>
    <button class="meny-knapp" id="menyKnapp" aria-label="Åpne meny">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- Mørk bakgrunn bak menyen -->
  <div class="meny-bakgrunn" id="menyBakgrunn"></div>

  <!-- Slideout-meny fra høyre -->
  <nav class="sidepanel" id="sidepanel">
    <ul class="meny-liste">
      <li><a href="https://hesteskokasting.no" target="_blank" rel="noopener">Til hesteskokasting.no</a></li>
      <li class="meny-skillelinje"></li>
      <li><a href="#/">Hjem</a></li>
      <li><a href="#/terminliste">Terminliste og Resultat</a></li>
      <li><a href="#/norgescupen">Norgescupen</a></li>
      <li><a href="#/norgesranking">Norgesranking</a></li>
      <li><a href="#/klubber">Klubber</a></li>
      <li><a href="#/kastere">Utøvere</a></li>
      <li class="meny-dropdown-item">
        <button class="meny-dropdown-knapp" id="statistikk-knapp" aria-expanded="false">
          Statistikk <span class="meny-chevron">▼</span>
        </button>
        <ul class="meny-undermeny" id="statistikk-undermeny" style="display:none">
          <li><a href="#/nmvinnere">NM-vinnere</a></li>
          <li><a href="#/rekorder">Rekorder</a></li>
        </ul>
      </li>
      <li><a href="#/dokumenter">Dokumenter</a></li>
    </ul>
  </nav>

  <div id="app"></div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script type="module" src="app.js"></script>
  <script>
    const knapp = document.getElementById('menyKnapp')
    const panel = document.getElementById('sidepanel')
    const bakgrunn = document.getElementById('menyBakgrunn')

    function apneMeny() {
      panel.classList.add('aktiv')
      bakgrunn.classList.add('aktiv')
      knapp.classList.add('aktiv')
    }

    function lukkMeny() {
      panel.classList.remove('aktiv')
      bakgrunn.classList.remove('aktiv')
      knapp.classList.remove('aktiv')
    }

    knapp.addEventListener('click', () => {
      panel.classList.contains('aktiv') ? lukkMeny() : apneMeny()
    })

    bakgrunn.addEventListener('click', lukkMeny)

    document.querySelectorAll('.sidepanel a').forEach(a => {
      a.addEventListener('click', lukkMeny)
    })

    document.getElementById('statistikk-knapp').addEventListener('click', () => {
      const undermeny = document.getElementById('statistikk-undermeny')
      const knapp = document.getElementById('statistikk-knapp')
      const open = undermeny.style.display !== 'none'
      undermeny.style.display = open ? 'none' : 'block'
      knapp.setAttribute('aria-expanded', !open)
      knapp.querySelector('.meny-chevron').textContent = open ? '▼' : '▲'
    })
  </script>
</body>
</html>
